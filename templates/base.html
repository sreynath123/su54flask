<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Green Store{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  :root {
    --primary-green: #2e7d32;
    --light-green: #4caf50;
    --lighter-green: #e8f5e9;
  }

  body {
    background: linear-gradient(135deg, #f1f8e9 0%, #ffffff 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .navbar {
    background: linear-gradient(135deg, var(--primary-green), var(--light-green)) !important;
    box-shadow: 0 2px 15px rgba(46, 125, 50, 0.2);
  }

  .navbar-brand {
    font-weight: bold;
    font-size: 1.5rem;
  }

  .navbar-brand i {
    margin-right: 8px;
  }

  .nav-link {
    color: rgba(255,255,255,0.9) !important;
    transition: all 0.3s ease;
  }

  .nav-link:hover {
    color: white !important;
    transform: translateY(-2px);
  }

  .nav-link.active {
    font-weight: bold;
    color: #ffd700 !important;
  }

  .btn-success {
    background: linear-gradient(135deg, var(--primary-green), var(--light-green));
    border: none;
    transition: transform 0.3s ease;
  }

  .btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
  }

  .btn-outline-success {
    border-color: var(--primary-green);
    color: var(--primary-green);
  }

  .btn-outline-success:hover {
    background: linear-gradient(135deg, var(--primary-green), var(--light-green));
    border-color: transparent;
  }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('front_home') }}">
      <i class="fas fa-seedling"></i>Green Store
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if not selected_category %}active{% endif %}" href="{{ url_for('front_home') }}">
            <i class="fas fa-th-large me-1"></i>All
          </a>
        </li>
        {% for cat in categories %}
        <li class="nav-item">
          <a class="nav-link {% if selected_category == cat.id %}active{% endif %}"
             href="{{ url_for('front_home', category_id=cat.id) }}">
            {% if cat.name == 'Drink' %}
              <i class="fas fa-coffee me-1"></i>
            {% elif cat.name == 'Food' %}
              <i class="fas fa-utensils me-1"></i>
            {% else %}
              <i class="fas fa-box me-1"></i>
            {% endif %}
            {{ cat.name }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
