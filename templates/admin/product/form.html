{% extends 'admin/master.html' %}

{% block page_title %}
Admin | Product
{% endblock %}

{% block content %}
<div class="content-wrapper">

  <div class="content-header">
    <div class="container-fluid">
      <h1 class="m-0">
        {{ 'Add Product' if status == 'add' else 'Edit Product' }}
      </h1>
    </div>
  </div>

  <div class="content">
    <div class="container-fluid">
      <div class="card">

        <div class="card-header">
          <a href="{{ url_for('product') }}"
             class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Back
          </a>
        </div>

        <div class="card-body">

          <form method="post" enctype="multipart/form-data" action="{{ url_for('add_product') if status == 'add' else url_for('edit_product') }}">


            {% if status == 'edit' %}
                <input type="hidden" name="product_id" value="{{ product.id }}">
            {% endif %}

            <!-- Image display -->
            <div class="mb-3 text-center">
                <img
                    src="{{ url_for('static', filename='uploads/' ~ (product.image if product and product.image else 'img.png')) }}"
                    style="width:150px;height:150px;object-fit:contain;border:1px solid #ccc;"
                >
            </div>

            <!-- Image upload -->
            <div class="mb-3">
                <label>Image</label>
                <input type="file"
                       name="image"
                       class="form-control"
                       accept="image/*">
            </div>



            <!-- NAME -->
            <div class="mb-3">
              <label>Name *</label>
              <input type="text"
                     name="name"
                     class="form-control"
                     value="{{ product.name if product else '' }}"
                     required>
            </div>

            <!-- CATEGORY -->
            <div class="mb-3">
              <label>Category</label>
              <select name="category" class="form-control" required>
                {% for item in category %}
                  <option value="{{ item.id }}"
                    {% if product and product.category_id == item.id %}
                      selected
                    {% endif %}
                  >
                    {{ item.name }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <!-- COST -->
            <div class="mb-3">
              <label>Cost *</label>
              <input type="number"
                     name="cost"
                     class="form-control"
                     value="{{ product.cost if product else 0 }}"
                     required>
            </div>

            <!-- PRICE -->
            <div class="mb-3">
              <label>Price *</label>
              <input type="number"
                     name="price"
                     class="form-control"
                     value="{{ product.price if product else 0 }}"
                     required>
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
              <label>Description</label>
              <textarea name="description"
                        class="form-control"
                        rows="3">{{ product.description if product else '' }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">
              {{ 'Save' if status == 'add' else 'Update' }}
            </button>

            <button type="reset" class="btn btn-danger">
              Cancel
            </button>

          </form>

        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
