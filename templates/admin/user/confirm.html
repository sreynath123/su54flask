{% extends 'admin/master.html'%}

{% block page_title %}
   Admin | Confirm Delete User
{% endblock %}

{% block content %}
<div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0"> Confirm Delete User</h1>
          </div><!-- /.col -->
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-right">
              <li class="breadcrumb-item"><a href="{{ url_for('user')}}">Home</a></li>
              <li class="breadcrumb-item active">Confirm Delete User</li>
            </ol>
          </div><!-- /.col -->
        </div><!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->

 <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
        <div class="card">
            <div class="card-header">
              <a href="{{ url_for('user')}}" class="btn btn-outline-secondary">
                  <i class="fas fa-users"></i>
                  Back
              </a>
            </div>

            <div class="card-body">
                <center>
                    <h3>Do you want to delete this user?</h3>
                    <ul>
                        <li>Username: {{ user.username }}</li>
                        <li>Email: {{ user.email }}</li>
                    </ul>
                </center>

                <form method="post"
                      action="{{ url_for('delete_user', user_id=user.id) }}"
                      onsubmit="return confirm('Delete user: {{ user.username }}?');">
                    <button type="submit" class="btn btn-danger btn-sm">
                        Delete
                    </button>
                </form>
            </div>
        </div>
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content -->
</div>
{% endblock %}
