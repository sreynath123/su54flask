{% extends 'admin/master.html' %}

{% block page_title %}
Admin | User
{% endblock %}

{% block content %}
<div class="content-wrapper">

  <!-- Header -->
  <div class="content-header">
    <div class="container-fluid">
      <h1 class="m-0">
        {{ 'Add User' if status == 'add' else 'Edit User' }}
      </h1>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="container-fluid">
      <div class="card">

        <!-- Back button -->
        <div class="card-header">
          <a href="{{ url_for('user') }}"
             class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Back
          </a>
        </div>

        <div class="card-body">

          <form method="post"
                action="{{ url_for('add_user') if status == 'add' else url_for('edit_user') }}">

            {% if status == 'edit' %}
              <input type="hidden" name="user_id" value="{{ user.id }}">
            {% endif %}

            <!-- USERNAME -->
            <div class="mb-3">
              <label>Username *</label>
              <input type="text"
                     name="username"
                     class="form-control"
                     value="{{ user.username if user else '' }}"
                     required>
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
              <label>Email *</label>
              <input type="email"
                     name="email"
                     class="form-control"
                     value="{{ user.email if user else '' }}"
                     required>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
              <label>
                Password
                {% if status == 'edit' %}
                  <small class="text-muted">(leave blank to keep current)</small>
                {% endif %}
              </label>
              <input type="password"
                     name="password"
                     class="form-control"
                     {% if status == 'add' %} required {% endif %}>
            </div>

            <button type="submit" class="btn btn-primary">
              {{ 'Save' if status == 'add' else 'Update' }}
            </button>

            <button type="reset" class="btn btn-danger">
              Cancel
            </button>

          </form>

        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}
