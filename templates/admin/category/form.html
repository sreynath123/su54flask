{% extends 'admin/master.html' %}

{% block page_title %}
Admin | Category
{% endblock %}

{% block content %}
<div class="content-wrapper">
  <div class="content-header">
    <div class="container-fluid">
      <h1 class="m-0">{{ 'Add Category' if status == 'add' else 'Edit Category' }}</h1>
    </div>
  </div>

  <div class="content">
    <div class="container-fluid">
      <div class="card">
        <div class="card-header">
          <a href="{{ url_for('category') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Back
          </a>
        </div>

        <div class="card-body">
          <form method="post" action="{{ url_for('add_category') if status == 'add' else url_for('edit_category') }}">
            {% if status == 'edit' %}
                <input type="hidden" name="category_id" value="{{ category.id }}">
            {% endif %}

            <div class="mb-3">
              <label>Name *</label>
              <input type="text"
                     name="name"
                     class="form-control"
                     value="{{ category.name if category else '' }}"
                     required>
            </div>

            <button type="submit" class="btn btn-primary">{{ 'Save' if status == 'add' else 'Update' }}</button>
            <button type="reset" class="btn btn-danger">Cancel</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
