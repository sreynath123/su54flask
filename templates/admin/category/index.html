{% extends 'admin/master.html'%}

{% block page_title %}
   Admin | Category
{% endblock %}

{% block content %}
<div class="content-wrapper">
    <div class="content-header">
        <div class="container-fluid">
            <h1 class="m-0">Category List</h1>
        </div>
    </div>

    <div class="content">
        <div class="container-fluid">
            <div class="card">
                <div class="card-header">
                    <a href="{{ url_for('form_category', action='add') }}" class="btn btn-outline-primary">
                        <i class="fas fa-plus-circle"></i> Add Category
                    </a>
                </div>

                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                            <tr class="bg-primary text-white">
                                <th>No.</th>
                                <th>Name</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                        {% for cat in categories %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td>{{ cat.name }}</td>
                                <td>
                                    <a href="{{ url_for('form_category', action='edit', category_id=cat.id) }}" class="btn btn-sm btn-outline-secondary">
                                        <i class="fas fa-user-edit"></i> Edit
                                    </a>
                                    <a href="{{ url_for('confirm_category', category_id=cat.id) }}" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash-alt"></i> Delete
                                    </a>
                                </td>
                            </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
